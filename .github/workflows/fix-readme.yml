name: Fix Profile README
on:
  workflow_dispatch:
jobs:
  fix-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Write correct README
        run: |
          echo "" | base64 -d > README.md
      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add README.md
          git diff --cached --quiet || git commit -m "Fix README: remove duplicate sections"
          git push
